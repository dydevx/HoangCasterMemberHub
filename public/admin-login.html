<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MemberHub - Admin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="auth" data-auth-role="admin">
    <div id="toast" class="toast" aria-live="polite"></div>

    <main id="auth-screen" class="auth-screen role-admin">
      <section class="auth-panel" aria-label="Đăng nhập Admin">
        <a class="back-link" href="/index.html">Quay lại</a>
        <div class="auth-brand">
          <span class="mark">M</span>
          <div>
            <p class="role-kicker">Admin hệ thống</p>
            <h1>Đăng nhập Admin</h1>
          </div>
        </div>

        <form id="login-form" class="form-stack">
          <input name="role" type="hidden" value="admin">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required placeholder="admin@domain.com">
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu">
          </label>
          <button class="primary" type="submit">Đăng nhập Admin</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
