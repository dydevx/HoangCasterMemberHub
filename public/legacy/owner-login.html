<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MemberHub - Chủ cửa hàng</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="auth" data-auth-role="owner">
    <div id="toast" class="toast" aria-live="polite"></div>

    <main id="auth-screen" class="auth-screen role-owner">
      <section class="auth-panel" aria-label="Đăng nhập chủ cửa hàng">
        <a class="back-link" href="/index.html">Quay lại</a>
        <div class="auth-brand">
          <span class="mark">M</span>
          <div>
            <p class="role-kicker">Chủ cửa hàng</p>
            <h1>Khu vực cửa hàng</h1>
          </div>
        </div>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-auth-tab="login" type="button">Đăng nhập</button>
          <button class="auth-tab" data-auth-tab="register" type="button">Đăng ký cửa hàng</button>
        </div>

        <form id="login-form" class="form-stack">
          <input name="role" type="hidden" value="owner">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required placeholder="owner@domain.com">
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu">
          </label>
          <button class="primary" type="submit">Đăng nhập cửa hàng</button>
        </form>

        <form id="register-form" class="form-stack hidden">
          <input name="role" type="hidden" value="owner">
          <label>
            Họ tên chủ cửa hàng
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            Email đăng nhập
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Số điện thoại
            <input name="phone" autocomplete="tel">
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="new-password" required minlength="6">
          </label>
          <label>
            Tên cửa hàng
            <input name="shop_name" required>
          </label>
          <label>
            Điện thoại cửa hàng
            <input name="shop_phone">
          </label>
          <label class="full">
            Địa chỉ cửa hàng
            <input name="shop_address">
          </label>
          <button class="primary" type="submit">Tạo tài khoản cửa hàng</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
