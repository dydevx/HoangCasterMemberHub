<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MemberHub - Khách hàng</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="auth" data-auth-role="customer">
    <div id="toast" class="toast" aria-live="polite"></div>

    <main id="auth-screen" class="auth-screen role-customer">
      <section class="auth-panel" aria-label="Đăng nhập khách hàng">
        <a class="back-link" href="/index.html">Quay lại</a>
        <div class="auth-brand">
          <span class="mark">M</span>
          <div>
            <p class="role-kicker">Khách hàng</p>
            <h1>Thẻ thành viên</h1>
          </div>
        </div>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-auth-tab="login" type="button">Đăng nhập</button>
          <button class="auth-tab" data-auth-tab="register" type="button">Đăng ký hội viên</button>
        </div>

        <form id="login-form" class="form-stack">
          <input name="role" type="hidden" value="customer">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required placeholder="customer@domain.com">
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="current-password" required placeholder="Nhập mật khẩu">
          </label>
          <button class="primary" type="submit">Đăng nhập hội viên</button>
        </form>

        <form id="register-form" class="form-stack hidden">
          <input name="role" type="hidden" value="customer">
          <label>
            Họ tên
            <input name="name" autocomplete="name" required>
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" required>
          </label>
          <label>
            Số điện thoại
            <input name="phone" autocomplete="tel">
          </label>
          <label>
            Mật khẩu
            <input name="password" type="password" autocomplete="new-password" required minlength="6">
          </label>
          <label>
            Cửa hàng
            <select name="shop_id" id="register-shop" required></select>
          </label>
          <label>
            Ngày sinh
            <input name="birthday" type="date">
          </label>
          <label class="full">
            Địa chỉ
            <input name="address">
          </label>
          <button class="primary" type="submit">Tạo tài khoản hội viên</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
